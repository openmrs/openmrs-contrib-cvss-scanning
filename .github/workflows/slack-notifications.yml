name: Slack notifications
on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:
jobs:
  run:
    name: Send notifications
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download previous test results DB
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: security-tests.yml
          name: test-results-db
          path: .
        continue-on-error: true  # First run won't have a DB artifact yet
        
      - name: Download previous test output file
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: security-tests.yml
          name: security-test-output
          path: .
        continue-on-error: false       

      - name: Download previous test report.json file
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: security-tests.yml
          name: security-test-report-json
          path: .
        continue-on-error: false   
        
      - name: Parse test results for slack notification
        id: parse-results-for-slack
        if: always() #&& github.ref == 'refs/heads/main'
        run: |
          FAILURE_COUNT=$(grep -oP '\d+(?= failed)' test_output.log | head -1)
          echo "failure_count=${FAILURE_COUNT:-0}" >> $GITHUB_ENV
          
      - name: Prepare new test categories text
        run: |
          NEW_CATEGORIES=$(python scripts/slack_report_generator.py report.json test_results.db)
          echo "new_categories=${NEW_CATEGORIES}" >> $GITHUB_ENV
      - name: echo variable
        run: |
          echo "${{ env.new_categories }}"
